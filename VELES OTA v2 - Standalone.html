  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

══════════════════════ */\nconst PROMOS = [\n{ id: 'deals', title: 'Last Minute Deals', sub: \"Flights from $199 — grab them before they're gone\",\n  badge: 'Up to 40% Off', img: (window.__resources && window.__resources.promoDeals) || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=900&q=80',\n  grad: 'linear-gradient(135deg,rgba(10,15,30,.92) 0%,rgba(227,0,27,.45) 100%)' },\n{ id: 'hotel', title: 'Weekend Escape', sub: 'Curated hotel packages from $299/night',\n  badge: 'Save 30%', img: (window.__resources && window.__resources.promoHotel) || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600&q=80',\n  grad: 'linear-gradient(135deg,rgba(10,15,30,.92) 0%,rgba(26,78,196,.45) 100%)' },\n{ id: 'biz', title: 'Business Class', sub: 'Premium cabin upgrades for less',\n  badge: 'Members Only', img: (window.__resources && window.__resources.promoBiz) || 'https://images.unsplash.com/photo-1540339832862-474599807836?w=600&q=80',\n  grad: 'linear-gradient(135deg,rgba(10,15,30,.92) 0%,rgba(124,58,237,.45) 100%)' }];\n\n\nfunction PromoSection() {\n  const [w, ...narrow] = PROMOS;\n  return (\n    <section style={{ background: '#f8fafc', padding: '80px 24px' }}>\n      <div style={{ maxWidth: 1152, margin: '0 auto' }}>\n        <div className=\"rv\" style={{ marginBottom: 40 }}>\n          <p style={{ fontSize: 11, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '.22em', color: 'var(--co)', marginBottom: 10 }}>Hot Offers<\u002Fp>\n          <h2 style={{ fontSize: '2.4rem', fontWeight: 900, color: 'var(--ink)', letterSpacing: '-.025em' }}>Don't Miss Out<\u002Fh2>\n        <\u002Fdiv>\n        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16, minHeight: 460 }}>\n          {/* Wide */}\n          <div className=\"rv card-lift\" style={{ position: 'relative', borderRadius: 20, overflow: 'hidden', cursor: 'pointer',\n            backgroundImage: `${w.grad}, url(${w.img})`, backgroundSize: 'cover', backgroundPosition ize: '1.2rem', fontWeight: 900, letterSpacing: '-.015em', marginBottom: 4 }}>{p.title}<\u002Fh3>\n                  <p style={{ color: 'rgba(255,255,255,.65)', fontSize: 12 }}>{p.sub}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            )}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>);\n\n}\n\n/* ════════════════════════════════════════════════\n   MARQUEE TICKER\n════════════════════════════════════════════════ */\nconst TICK = ['✈ New York', '🏨 Paris', '🌊 Bali', '🏔 Swiss Alps', '🕌 Dubai', '🌸 Tokyo', '🛥 Santorini', '🦁 Nairobi', '🏛 Rome', '🌴 Maldives'];\n\nfunction Ticker() {\n  const items = [...TICK, ...TICK];\n  return (\n    <div style={{ background: 'var(--a)', padding: '13px 0', overflow: 'hidden', position: 'relative' }}>\n      <div className=\"ticker-track\" style={{ display: 'flex', gap: 48, whiteSpace: 'nowrap', width: 'max-content' }}>\n        {items.map((t, i) =>\n        <span key={i} style={{ fontSize: 12, fontWeight: 700, color: 'rgba(255,255,255,.9)', letterSpacing: '.06em', textTransform: 'uppercase' }}>\n            {t}\n          <\u002Fspan>\n        )}\n      <\u002Fdiv>\n    <\u002Fdiv>);\n\n}\n\n/* ════════════════════════════════════════════════\n   CTA SECTION\n════════════════════════════════════════════════ */\nfunction CTASection() {\n  return (\n    <section style={{ background: 'linear-gradient(135deg, #b91c1c 0%, #dc2626 45%, #c8001a 100%)', padding: '88px 24px 96px', position: 'relative', overflow: 'hidden' }} data-comment-anchor=\"52bc648775-section-642-5\">\n      {/* Light highlight top-right */}\n      <div style={{ position: 'absolute', right: -100, top: -100, width: 520, height: 520, borderRadius: '50%', background: 'radial-gradient(circle, rgba(255,255,255,.2) 0%, transparent 65%)', pointerEvents: 'none' }} />\n      {/* Shadow depth bottom-left */}\n      <div style={{ position: 'absolute', left: -80, bottom: -80, width: 380, height: 380, borderRadius: '50%', background: 'radial-gradient(circle, rgba(0,0,0,.22) 0%, transparent 65%)', pointerEvents: 'none' }} />\n      {/* Dot grid overlay */}\n      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(circle, rgba(255,255,255,.15) 1px, transparent 1px)', backgroundSize: '30px 30px', pointerEvents: 'none' }} />\n\n      <div style={{ maxWidth: 1152, margin: '0 auto', display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: 40, position: 'relative', zIndex: 1 }}>\n        <div style={{ maxWidth: 540 }}>\n          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,.2)', border: '1px solid rgba(255,255,255,.35)', borderRadius: 99, padding: '6px 16px', marginBottom: 20 }}>\n            <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--a)', display: 'block', flexShrink: 0 }} />\n            <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: '.18em', textTransform: 'uppercase', color: 'rgba(255,255,255,.95)' }}>Start Planning Today<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style={{ fontSize: 'clamp(2rem,4.5vw,3.2rem)', fontWeight: 900, color: 'white', letterSpacing: '-.03em', lineHeight: 1.06, marginBottom: 16 }}>\n            Your Next Adventure<br />\n            <span style={{ color: 'rgba(255,255,255,.88)' }}>Awaits.<\u002Fspan>\n          <\u002Fh2>\n          <p style={{ color: 'rgba(255,255,255,.8)', fontSize: 15, fontWeight: 500, lineHeight: 1.65 }}>\n            Join 10M+ travelers who book smarter with VELÈS — transparent pricing, 24/7 concierge, zero surprises.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, minWidth: 200 }}>\n          <button style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, padding: '17px 32px', borderRadius: 99, background: 'white', border: 'none', cursor: 'pointer', transition: 'all .2s', boxShadow: '0 8px 32px -4px rgba(0,0,0,.25)' }}\n          onMouseEnter={(e) => {e.currentTarget.style.transform = 'scale(1.04)';e.currentTarget.style.boxShadow = '0 12px 40px -4px rgba(0,0,0,.35)';}}\n          onMouseLeave={(e) => {e.currentTarget.style.transform = 'scale(1)';e.currentTarget.style.boxShadow = '0 8px 32px -4px rgba(0,0,0,.25)';}}>\n            <ISearch size={18} style={{ color: 'var(--a)' }} />\n            <span style={{ fontSize: 15, fontWeight: 800, color: 'var(--a)' }}>Search Flights<\u002Fspan>\n          <\u002Fbutton>\n          <button style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, padding: '17px 32px', borderRadius: 99, background: 'rgba(255,255,255,.15)', border: '2px solid rgba(255,255,255,.5)', cursor: 'pointer', transition: 'all .2s', color: 'white' }}\n          onMouseEnter={(e) => {e.currentTarget.style.background = 'rgba(255,255,255,.25)';}}\n          onMouseLeave={(e) => {e.currentTarget.style.background = 'rgba(255,255,255,.15)';}}>\n            <span style={{ fontSize: 15, fontWeight: 700 }}>View All Deals →<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>);\n\n}\n\n/* ════════════════════════════════════════════════\n   FOOTER\n════════════════════════════════════════════════ */\nconst FCOLS = [\n{ h: 'Company', links: ['About VELÈS', 'Careers', 'Press Room', 'Investors', 'Blog'] },\n{ h: 'Explore', links: ['Flights', 'Hotels', 'Packages', 'Experiences', 'Cruises'] },\n{ h: 'Legal', links: ['Privacy Policy', 'Terms of Use', 'Cookie Settings', 'Accessibility'] },\n{ h: 'Support Hub', links: ['Help Center', 'Contact Us', 'Cancel Booking', 'Travel Alerts', 'Safety Info'] }];\n\n\nfunction Footer() {\n  return (\n    <footer style={{ background: '#111827', color: 'white', marginTop: 72 }}>\n\n\n      {/* ── Main body ── */}\n      <div style={{ padding: '64px 24px 0', maxWidth: 1152, margin: '0 auto' }}>\n\n        {/* Brand + newsletter row */}\n        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, marginBottom: 56, paddingBottom: 48, borderBottom: '1px solid rgba(255,255,255,.08)' }}>\n          <div>\n            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>\n              <div style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--a)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 8px 24px -4px color-mix(in srgb,var(--a) 50%,transparent)' }}>\n                <span style={{ color: 'white', fontWeight: 900, fontSize: 15 }}>VL<\u002Fspan>\n              <\u002Fdiv>\n              <div>\n                <span style={{ fontWeight: 900, fontSize: '1.1rem', letterSpacing: '.28em', textTransform: 'uppercase', display: 'block' }}>VELÈS<\u002Fspan>\n                <span style={{ fontSize: 10, color: 'rgba(255,255,255,.35)', fontWeight: 600, letterSpacing: '.1em', textTransform: 'uppercase' }}>Premium Travel<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style={{ color: 'rgba(255,255,255,.45)', fontSize: 13, lineHeight: 1.8, maxWidth: 300, marginBottom: 24 }}>\n              The premium travel experience for the modern explorer. Curated itineraries, transparent pricing, world-class 24/7 support.\n            <\u002Fp>\n            <div style={{ display: 'flex', gap: 10 }}>\n              {[['FB', 'f'], ['TW', '𝕏'], ['IG', '◎'], ['LI', 'in']].map(([k, icon]) =>\n              <button key={k}\n              style={{ width: 40, height: 40, borderRadius: 10, border: '1px solid rgba(255,255,255,.1)', background: 'rgba(255,255,255,.05)', color: 'rgba(255,255,255,.5)', fontSize: 13, fontWeight: 800, cursor: 'pointer', transition: 'all .2s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}\n              onMouseEnter={(e) => {e.currentTarget.style.background = 'var(--a)';e.currentTarget.style.color = 'white';e.currentTarget.style.borderColor = 'var(--a)';e.currentTarget.style.transform = 'translateY(-3px)';}}\n              onMouseLeave={(e) => {e.currentTarget.style.background = 'rgba(255,255,255,.05)';e.currentTarget.style.color = 'rgba(255,255,255,.5)';e.currentTarget.style.borderColor = 'rgba(255,255,255,.1)';e.currentTarget.style.transform = 'none';}}>\n                  {icon}\n                <\u002Fbutton>\n              )}\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>\n            <div style={{ background: 'rgba(255,255,255,.04)', border: '1px solid rgba(255,255,255,.08)', borderRadius: 20, padding: 28 }}>\n              <p style={{ fontSize: 18, fontWeight: 900, marginBottom: 6, letterSpacing: '-.01em' }}>✉️ Deals in your inbox<\u002Fp>\n              <p style={{ color: 'rgba(255,255,255,.45)', fontSize: 13, marginBottom: 20, lineHeight: 1.6 }}>\n                Exclusive fares, flash sales, travel inspo — zero spam, unsubscribe any time.\n              <\u002Fp>\n              <div style={{ display: 'flex', gap: 10 }}>\n                <input type=\"email\" placeholder=\"your@email.com\"\n                style={{ flex: 1, background: 'rgba(255,255,255,.08)', border: '1.5px solid rgba(255,255,255,.12)', borderRadius: 12, padding: '13px 16px', color: 'white', fontSize: 13, fontWeight: 500, outline: 'none' }}\n                onFocus={(e) => e.target.style.borderColor = 'var(--a)'}\n                onBlur={(e) => e.target.style.borderColor = 'rgba(255,255,255,.12)'} />\n                <button style={{ padding: '13px 22px', borderRadius: 12, background: 'var(--a)', color: 'white', fontSize: 13, fontWeight: 800, border: 'none', cursor: 'pointer', whiteSpace: 'nowrap', boxShadow: '0 4px 20px -4px color-mix(in srgb,var(--a) 60%,transparent)', transition: 'all .2s' }}\n                onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.04)'}\n                onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}>\n                  Subscribe\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>\n                {[['🍎', 'App Store', 'iOS'], ['▶', 'Google Play', 'Android']].map(([ico, label, sub]) =>\n                <button key={label} style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'rgba(255,255,255,.06)', border: '1px solid rgba(255,255,255,.1)', borderRadius: 12, cursor: 'pointer', transition: 'all .2s', color: 'white' }}\n                onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(255,255,255,.12)'}\n                onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,.06)'}>\n                    <span style={{ fontSize: 18 }}>{ico}<\u002Fspan>\n                    <div style={{ textAlign: 'left' }}>\n                      <p style={{ fontSize: 9, color: 'rgba(255,255,255,.4)', fontWeight: 600, letterSpacing: '.06em', textTransform: 'uppercase' }}>{sub}<\u002Fp>\n                      <p style={{ fontSize: 12, fontWeight: 800 }}>{label}<\u002Fp>\n                    <\u002Fdiv>\n                  <\u002Fbutton>\n                )}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        {/* Nav columns */}\n        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 32, marginBottom: 48 }}>\n          {FCOLS.map((col, i) =>\n          <div key={i}>\n              <h4 style={{ fontSize: 10, fontWeight: 900, marginBottom: 18, color: 'var(--a)', letterSpacing: '.18em', textTransform: 'uppercase' }}>{col.h}<\u002Fh4>\n              <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 12 }}>\n                {col.links.map((l, j) =>\n              <li key={j}>\n                    <a href=\"#\" style={{ color: 'rgba(255,255,255,.38)', fontSize: 13, fontWeight: 500, textDecoration: 'none', transition: 'all .2s', display: 'inline-block' }}\n                onMouseEnter={(e) => {e.currentTarget.style.color = 'white';e.currentTarget.style.paddingLeft = '6px';}}\n                onMouseLeave={(e) => {e.currentTarget.style.color = 'rgba(255,255,255,.38)';e.currentTarget.style.paddingLeft = '0';}}>{l}<\u002Fa>\n                  <\u002Fli>\n              )}\n              <\u002Ful>\n            <\u002Fdiv>\n          )}\n        <\u002Fdiv>\n\n        {/* Payment strip */}\n        <div style={{ borderTop: '1px solid rgba(255,255,255,.06)', borderBottom: '1px solid rgba(255,255,255,.06)', padding: '18px 0', marginBottom: 24, display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>\n          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>\n            <span style={{ fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,.28)', letterSpacing: '.1em', textTransform: 'uppercase', marginRight: 4 }}>Secure Payments<\u002Fspan>\n            {['VISA', 'MC', 'AMEX', 'PayPal', 'Apple Pay'].map((p) =>\n            <span key={p} style={{ fontSize: 10, fontWeight: 800, color: 'rgba(255,255,255,.45)', padding: '4px 10px', borderRadius: 6, border: '1px solid rgba(255,255,255,.1)', background: 'rgba(255,255,255,.04)', letterSpacing: '.04em' }}>{p}<\u002Fspan>\n            )}\n          <\u002Fdiv>\n          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>\n            {[1, 2, 3, 4, 5].map((s) => <IStar key={s} size={13} style={{ color: 'var(--a)' }} />)}\n            <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 12, marginLeft: 6, fontWeight: 600 }}>4.9 · 200k+ reviews<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        {/* Bottom bar */}\n        <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: 12, paddingBottom: 32 }}>\n          <p style={{ color: 'rgba(255,255,255,.2)', fontSize: 12, fontWeight: 500 }}>© 2026 VELÈS Travel, Inc. All rights reserved.<\u002Fp>\n          <div style={{ display: 'flex', gap: 20 }}>\n            {['Privacy', 'Terms', 'Cookies', 'Sitemap'].map((l) =>\n            <a key={l} href=\"#\" style={{ color: 'rgba(255,255,255,.22)', fontSize: 12, fontWeight: 500, textDecoration: 'none', transition: 'color .2s' }}\n            onMouseEnter={(e) => e.target.style.color = 'rgba(255,255,255,.75)'}\n            onMouseLeave={(e) => e.target.style.color = 'rgba(255,255,255,.22)'}>{l}<\u002Fa>\n            )}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffooter>);\n\n}\n\n/* ════════════════════════════════════════════════\n   APP + TWEAKS\n════════════════════════════════════════════════ */\nconst ACCENT_MAP = {\n  '#E3001B': '#fff0f1', '#FF4500': '#fff4f0', '#7C3AED': '#f5f3ff',\n  '#1D4ED8': '#eff6ff', '#059669': '#ecfdf5', '#0891B2': '#ecfeff'\n};\n\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"#E3001B\",\n  \"scene\": \"alpine\"\n} /*EDITMODE-END*/;\n\nfunction App() {\n  const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakRadio } = window;\n  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);\n\n  useEffect(() => {\n    document.documentElement.style.setProperty('--a', t.accent);\n    document.documentElement.style.setProperty('--ab', ACCENT_MAP[t.accent] || '#fff0f1');\n  }, [t.accent]);\n\n  useReveal();\n\n  return (\n    <div style={{ fontFamily: \"'Plus Jakarta Sans',system-ui,sans-serif\" }}>\n      <NavBar />\n      <Hero scene={t.scene} />\n      {/* Search widget — overlaps hero */}\n      <div style={{ position: 'relative', zIndex: 20, padding: '0 24px', marginTop: -64 }}>\n        <div style={{ maxWidth: 1100, margin: '0 auto' }}>\n          <SearchWidget />\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <StatsStrip />\n      <ValueProps />\n      <Destinations />\n      <Ticker />\n      <PromoSection />\n      <CTASection />\n      <Footer />\n\n      <TweaksPanel>\n        <TweakSection label=\"Brand\" />\n        <TweakColor label=\"Accent\" value={t.accent}\n        options={['#E3001B', '#FF4500', '#7C3AED', '#1D4ED8', '#059669', '#0891B2']}\n        onChange={(v) => setTweak('accent', v)} />\n        <TweakSection label=\"Hero Scene\" />\n        <TweakRadio label=\"Scene\" value={t.scene}\n        options={['coastal', 'alpine', 'urban']}\n        onChange={(v) => setTweak('scene', v)} />\n      <\u002FTweaksPanel>\n    <\u002Fdiv>);\n\n}\n\nfunction waitAndRender() {\n  if (window.useTweaks) {\n    ReactDOM.createRoot(document.getElementById('root')).render(<App />);\n  } else {setTimeout(waitAndRender, 20);}\n}\nwaitAndRender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
