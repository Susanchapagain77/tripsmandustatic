<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Ticket — TripsManDu Partner</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%228%22%20fill%3D%22%23E3001B%22%2F%3E%3Ctext%20x%3D%2216%22%20y%3D%2222%22%20font-family%3D%22Arial%2C%20sans-serif%22%20font-weight%3D%22900%22%20font-size%3D%2214%22%20fill%3D%22white%22%20text-anchor%3D%22middle%22%3ETM%3C%2Ftext%3E%3C%2Fsvg%3E">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --a:#E3001B; --a2:#ff2d55; --navy:#0A0F1E; --bg:#F2F4F8; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --ok:#16a34a; --okbg:#e8f7ee; --warn:#b45309; --warnbg:#fff7e6; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);min-height:100vh;}
  a{text-decoration:none;color:inherit;}
  .top{background:white;border-bottom:1px solid var(--line);padding:0 26px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;}
  .tm{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:12px;flex-shrink:0;}
  .crumb{font-size:13px;font-weight:700;color:var(--muted);}
  .crumb b{color:var(--ink);}
  .wrap{max-width:820px;margin:0 auto;padding:28px 22px 60px;}
  .back{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:18px;cursor:pointer;background:none;border:none;font-family:inherit;}
  .back:hover{color:var(--a);}
  .head{background:white;border-radius:16px;box-shadow:0 2px 12px -4px rgba(10,15,30,.08);padding:22px 26px;margin-bottom:16px;}
  .head h1{font-size:19px;font-weight:900;margin:6px 0 12px;}
  .tid{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--a);}
  .meta{display:flex;gap:22px;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:700;}
  .meta b{color:var(--ink);display:block;font-size:12.5px;margin-top:2px;}
  .meta a{color:var(--a);font-weight:800;}
  .pill{font-size:11px;font-weight:800;padding:4px 12px;border-radius:99px;white-space:nowrap;}
  .p-ok{background:var(--okbg);color:var(--ok);}
  .p-warn{background:var(--warnbg);color:var(--warn);}
  .p-blue{background:#e8f0fe;color:#1d4ed8;}
  .thread{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
  .msg{max-width:85%;border-radius:14px;padding:14px 18px;box-shadow:0 2px 12px -4px rgba(10,15,30,.08);}
  .msg .who{font-size:11px;font-weight:800;margin-bottom:5px;display:flex;gap:8px;align-items:baseline;}
  .msg .when{font-weight:600;color:var(--muted);font-size:10.5px;}
  .msg p.body{font-size:13px;font-weight:600;line-height:1.55;}
  .me{background:white;align-self:flex-start;border:1px solid var(--line);}
  .me .who{color:var(--a);}
  .ops{background:var(--navy);color:white;align-self:flex-end;}
  .ops .who{color:#ffb3bd;}
  .ops .when{color:rgba(255,255,255,.5);}
  .sys{align-self:center;font-size:11.5px;font-weight:700;color:var(--muted);background:#e9edf3;border-radius:99px;padding:6px 16px;}
  .reply{background:white;border-radius:16px;box-shadow:0 2px 12px -4px rgba(10,15,30,.08);padding:18px 20px;}
  .reply textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;font-family:inherit;font-size:13px;resize:vertical;outline:none;}
  .reply textarea:focus{border-color:var(--a);}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;border-radius:99px;padding:10px 20px;transition:all .2s;}
  .btn-p{background:linear-gradient(135deg,var(--a),var(--a2));color:white;box-shadow:0 4px 14px -4px rgba(227,0,27,.45);}
  .btn-g{background:white;color:var(--ink);border:1.5px solid var(--line);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:white;font-size:13px;font-weight:700;padding:12px 22px;border-radius:99px;transition:transform .3s;z-index:99;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .demo{margin-top:22px;font-size:11.5px;color:var(--muted);font-weight:600;}
  .demo a{color:var(--a);font-weight:800;}
</style>
</head>
<body>

<div class="top">
  <a class="tm" href="index.html">TM</a>
  <span class="crumb">Partner Portal / <b>Support Ticket</b></span>
</div>

<div class="wrap">
  <button class="back" onclick="history.length>1?history.back():location.href='agency.html'">← Back to Support Tickets</button>

  <div class="head">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;">
      <span class="tid" id="t-id">Ticket #TKT-000</span>
      <span class="pill" id="t-status">—</span>
    </div>
    <h1 id="t-title">—</h1>
    <div class="meta">
      <div>Raised by<b id="t-by">—</b></div>
      <div>Created<b id="t-created">—</b></div>
      <div>Category<b id="t-cat">—</b></div>
      <div>Priority<b id="t-pri">—</b></div>
      <div>Related PNR<b id="t-pnr">—</b></div>
    </div>
  </div>

  <div class="thread" id="thread"></div>

  <div class="reply" id="replybox">
    <p style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;">Reply</p>
    <textarea rows="3" id="replytext" placeholder="Write a reply to TripsManDu ops…"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
      <button class="btn btn-p" onclick="sendReply()">Send reply</button>
      <button class="btn btn-g" onclick="toast('✓ Demo: attachment added to your reply')">📎 Attach file</button>
      <button class="btn btn-g" style="margin-left:auto;" id="closebtn" onclick="closeTicket()">Mark as resolved</button>
    </div>
  </div>

  <p class="demo">Demo tickets: <a href="ticket.html?t=1">#1 Open</a> · <a href="ticket.html?t=2">#2 In Progress</a> · <a href="ticket.html?t=3">#3 Resolved</a></p>
</div>

<div class="toast" id="toastEl"></div>

<script>
  const TICKETS = {
    '1': { id:'TKT-2026-0714', title:'PNR not reflecting ticketed status', status:'Open', created:'18 Jul 2026, 11:42',
      by:'Pemba Sherpa · Himalayan Voyages', cat:'Ticketing', pri:'High', pnr:'PNR-KTM4471',
      thread:[
        ['me','Pemba Sherpa','18 Jul, 11:42','We issued PNR-KTM4471 this morning and the wallet was debited NPR 32,651, but the booking still shows as Booked instead of Ticketed in our Booking Logs. E-ticket email has not reached the passenger either.'],
        ['sys','Ticket assigned to TripsManDu Ops · SLA: first response within 4 business hours'],
      ]},
    '2': { id:'TKT-2026-0691', title:'Wallet top-up not credited', status:'In Progress', created:'15 Jul 2026, 09:20',
      by:'Pemba Sherpa · Himalayan Voyages', cat:'Wallet & Payments', pri:'Medium', pnr:'—',
      thread:[
        ['me','Pemba Sherpa','15 Jul, 09:20','Bank transfer top-up of NPR 1,00,000 (ref BNK-990441) was sent on 5 Jul but the wallet still shows Pending. Please check with finance — we are close to our issuing limit.'],
        ['ops','Ops · Kritika','15 Jul, 12:05','Namaste Pemba ji, we have located the transfer in the settlement account. Finance is matching the reference number; the credit should reflect within 24 hours. Keeping this ticket In Progress until confirmed.'],
        ['me','Pemba Sherpa','16 Jul, 08:44','Thank you. Please prioritise — we have group issuance scheduled for Friday.'],
        ['sys','Priority raised to Medium-High by Ops'],
      ]},
    '3': { id:'TKT-2026-0623', title:'Unable to add sub-agent', status:'Resolved', created:'10 Jul 2026, 15:10',
      by:'Pemba Sherpa · Himalayan Voyages', cat:'Account & Access', pri:'Low', pnr:'—',
      thread:[
        ['me','Pemba Sherpa','10 Jul, 15:10','Trying to add a new sub-agent (Maya Tamang) but the Save button shows a duplicate-PAN error even though this PAN has never been registered with us.'],
        ['ops','Ops · Suraj','10 Jul, 17:31','The PAN was attached to a draft application from 2025 that was never completed. We have cleared the stale record — please try adding the sub-agent again.'],
        ['me','Pemba Sherpa','11 Jul, 10:02','Worked perfectly, thank you.'],
        ['ops','Ops · Suraj','11 Jul, 10:15','Great — marking this resolved. The ticket reopens automatically if you reply within 7 days.'],
        ['sys','Ticket marked Resolved · 11 Jul 2026'],
      ]},
  };

  const q = new URLSearchParams(location.search).get('t') || '1';
  const d = TICKETS[q] || TICKETS['1'];

  document.title = d.id + ' — ' + d.title + ' · TripsManDu';
  document.getElementById('t-id').textContent = 'Ticket ' + d.id;
  document.getElementById('t-title').textContent = d.title;
  document.getElementById('t-by').textContent = d.by;
  document.getElementById('t-created').textContent = d.created;
  document.getElementById('t-cat').textContent = d.cat;
  document.getElementById('t-pri').textContent = d.pri;
  document.getElementById('t-pnr').innerHTML = d.pnr === '—' ? '—' : '<a href="pnr.html?pnr=' + d.pnr + '">' + d.pnr + '</a>';
  const st = document.getElementById('t-status');
  st.textContent = d.status;
  st.className = 'pill ' + (d.status === 'Resolved' ? 'p-ok' : d.status === 'In Progress' ? 'p-blue' : 'p-warn');

  document.getElementById('thread').innerHTML = d.thread.map(m => {
    if (m[0] === 'sys') return '<div class="sys">' + m[1] + '</div>';
    return '<div class="msg ' + m[0] + '"><p class="who">' + m[1] + ' <span class="when">' + m[2] + '</span></p><p class="body">' + m[3] + '</p></div>';
  }).join('');

  if (d.status === 'Resolved') {
    const c = document.getElementById('closebtn');
    c.textContent = '✓ Resolved'; c.disabled = true; c.style.opacity = .5; c.style.cursor = 'not-allowed';
  }

  function sendReply(){
    const ta = document.getElementById('replytext');
    if (!ta.value.trim()) { toast('Write a reply first'); return; }
    const div = document.createElement('div');
    div.className = 'msg me';
    div.innerHTML = '<p class="who">Pemba Sherpa <span class="when">just now</span></p><p class="body"></p>';
    div.querySelector('.body').textContent = ta.value;
    document.getElementById('thread').appendChild(div);
    ta.value = '';
    toast('✓ Reply sent — ops will be notified');
  }
  function closeTicket(){
    const st = document.getElementById('t-status');
    st.textContent = 'Resolved'; st.className = 'pill p-ok';
    const c = document.getElementById('closebtn');
    c.textContent = '✓ Resolved'; c.disabled = true; c.style.opacity = .5;
    toast('✓ Ticket marked as resolved');
  }
  let tt;
  function toast(msg){
    const t = document.getElementById('toastEl');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
