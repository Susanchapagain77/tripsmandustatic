/* ═══ SECTION: TRANSACTIONS ═══ */
function MyTransactions() {
  const [q, setQ] = useState('');
  const [gw, setGw] = useState('All');
  const [st, setSt] = useState('All');
  const gateways = ['All', ...new Set(TRANSACTIONS.map(t => t.gateway))];
  const statuses = ['All', 'SUCCESS', 'INITIATED', 'FAILED'];
  const filtered = TRANSACTIONS.filter(t =>
    (gw === 'All' || t.gateway === gw) &&
    (st === 'All' || t.status === st) &&
    (!q || t.ctx.toLowerCase().includes(q.toLowerCase()) || t.txnId.includes(q))
  );
  const totalSuccess = TRANSACTIONS.filter(t=>t.status==='SUCCESS').reduce((s,t)=>s+t.amount,0);

  return (
    <div className="fade">
      <PageHeader title="All Transactions" sub={`${TRANSACTIONS.length} records · NPR ${totalSuccess.toLocaleString()} collected`} />
      {/* Filters */}

        <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'center' }}>

            <div key={label} style={{ position:'relative', minWidth:160 }}>
              <select value={val} onChange={e=>setter(e.target.value)}
                style={{ height:40, width:'100%', padding:'0 32px 0 12px', border:'1.5px solid #e2e8f0', borderRadius:10, fontSize:13, fontWeight:600, color:'var(--ink)', appearance:'none', outline:'none', background:'white', cursor:'pointer' }}>
                {opts.map(o=><option key={o}>{o === 'All' ? `All ${label}s` : o}</option>)}

              <tr style={{ background:'#fafbfd', borderBottom:'1.5px solid #f1f5f9' }}>

                <tr key={t.id} style={{ borderBottom:'1px solid #f8fafc', background:i%2===0?'white':'#fafbfd' }}

                  <td style={{ padding:'12px 16px', color:'var(--slate)', fontWeight:600 }}>{t.date}</td>
                  <td style={{ padding:'12px 16px' }}><Badge status={t.status} /></td>
                  <td style={{ padding:'12px 16px', fontFamily:'monospace', fontSize:11, color:'var(--muted)' }}>{t.txnId}</td>
                </tr>
              ))}

/* ═══ SECTION: NOTICES ═══ */
function MyNotices() {
  const [notices, setNotices] = useState(NOTICES);
  const [expanded, setExpanded] = useState(null);
  const unread = notices.filter(n=>!n.read).length;
  const markRead = (id) => setNotices(p => p.map(n => n.id===id ? {...n, read:true} : n));
  const markAll = () => setNotices(p => p.map(n => ({...n, read:true})));

  return (
    <div className="fade">
      <PageHeader title={<>My Notices <span style={{ fontSize:16, fontWeight:800, color:'white', background:'var(--a)', borderRadius:99, padding:'2px 10px', marginLeft:8 }}>{notices.length}</span></>}
        action={unread>0 && <Btn ghost sm onClick={markAll}><ICheck size={13} /> Mark all read</Btn>} />
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {notices.map(n => (
          <Card key={n.id} pad={0} style={{ border: !n.read ? '1.5px solid rgba(227,0,27,.2)' : '1px solid #f1f5f9', overflow:'hidden' }}>
            <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', cursor:'pointer', background: !n.read ? '#fff8f8' : 'white', transition:'background .2s' }}
              onClick={() => { setExpanded(expanded===n.id?null:n.id); if(!n.read) markRead(n.id); }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background: n.read ? '#e2e8f0' : 'var(--a)', flexShrink:0, boxShadow: !n.read ? '0 0 0 3px rgba(227,0,27,.2)' : 'none' }} />
              <p style={{ flex:1, fontSize:13, fontWeight: n.read ? 600 : 800, color:'var(--ink)' }}>{n.title}</p>
              <span style={{ fontSize:11, color:'var(--muted)', fontWeight:600, marginRight:8 }}>{n.date}</span>
              {!n.read && <span style={{ fontSize:10, fontWeight:800, color:'var(--a)', background:'rgba(227,0,27,.08)', padding:'2px 8px', borderRadius:99, marginRight:8 }}>NEW</span>}
              <IEye size={15} style={{ color: expanded===n.id ? 'var(--a)' : 'var(--muted)' }} />
            </div>
            {expanded === n.id && (
              <div style={{ padding:'12px 18px 16px', borderTop:'1px solid #f8fafc', background:'#fafbfd' }}>
                <p style={{ fontSize:13, color:'var(--slate)', lineHeight:1.65, fontWeight:500 }}>{n.body}</p>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

    { id:5, airline:'Malaysia Airlines', code:'MH', dep:'13:45', arr:'22:55', depTz:'UTC+5', arrTz:'UTC+8', depCity:'Kathmandu, Nepal', arrCity:'Kuala Lumpur, Malaysia', depCode:'KTM', arrCode:'KUL', dur:'9h 10m', stops:1, price:41800, cabin:'Business', refund:'Fully Refundable', seats:3, depDate:'Aug 20, 2026', arrDate:'Aug 20, 2026' },
  ];
  
  const DEFAULT = {
    flights: FLIGHTS_DB,
    user: { name:'Susan', email:'susan@tripsmandu.com', phone:'+977 9841 000 111', tier:'Gold Member', joined:'Jan 2024' },
    bookings: [],
    selectedFlight: null,
    searchParams: { from:'KTM', to:'KUL', depDate:'', adults:1, cabin:'Economy' }
  };
  
  function get() {
    try {
      const s = localStorage.getItem(KEY);
      return s ? JSON.parse(s) : DEFAULT;
    } catch (e) { return DEFAULT; }
  }
  
  function set(updates) {
    const curr = get();
    const next = { ...curr, ...updates };
    localStorage.setItem(KEY, JSON.stringify(next));
    return next;
  }
  
  function selectFlight(id) {
    const state = get();
    const flight = state.flights.find(f => f.id === id);
    if (flight) set({ selectedFlight: flight });
    return flight;
  }
  
  function addBooking(pax) {
    const state = get();
    const booking = {
      id: 'BK' + Math.random().toString(36).slice(2,8).toUpperCase(),
      flight: state.selectedFlight,
      passenger: pax,
      bookedAt: new Date().toLocaleString(),
      status: 'Confirmed'
    };
    return set({ bookings: [...state.bookings, booking] });
  }
  
  function getBookings() { return get().bookings; }
  function getSearchParams() { return get().searchParams; }
  function setSearchParams(p) { return set({ searchParams: p }); }
  function getFlights() { return get().flights; }
  function getUser() { return get().user; }
  function getSelectedFlight() { return get().selectedFlight; }
  
  return { get, set, selectFlight, addBooking, getBookings, getSearchParams, setSearchParams, getFlights, getUser, getSelectedFlight };
})();
